<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion / Inscription | Mada film</title>
    
    <style>
        /* Variables CSS fournies */
        :root {
            --default-font: "EB Garamond", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --heading-font: "EB Garamond", sans-serif;
            --nav-font: "Inter", sans-serif;

            --background-color: #ffffff; 
            --default-color: #212529; 
            --heading-color: #535353; 
            --accent-color: #465367; 
            --surface-color: #ffffff; 
            --contrast-color: #ffffff;
            
            --border-color: #e2e8f0;
            --input-bg: #f8fafc;
        }

        /* Reset & Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--default-font);
            background-color: var(--background-color);
            color: var(--default-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Layout Épuré (Monochrome & Minimaliste) */
        .auth-wrapper {
            width: 100%;
            max-width: 450px;
            padding: 40px 20px;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-header h1 {
            font-family: var(--heading-font);
            font-size: 2.5rem;
            color: var(--heading-color);
            font-weight: 500;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .brand-header p {
            font-size: 1rem;
            color: #64748b;
            font-weight: 300;
        }

        /* Onglets discrets */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 35px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: none;
            border: none;
            font-family: var(--nav-font);
            font-size: 0.95rem;
            color: #94a3b8;
            cursor: pointer;
            padding-bottom: 8px;
            position: relative;
            transition: color 0.3s ease;
        }

        .tab-btn:hover {
            color: var(--accent-color);
        }

        .tab-btn.active {
            color: var(--default-color);
            font-weight: 600;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -11px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--accent-color);
        }

        /* Formulaires */
        .form-content {
            display: none;
        }

        .form-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        label {
            display: block;
            font-family: var(--nav-font);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            color: var(--heading-color);
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            background-color: var(--input-bg);
            color: var(--default-color);
            transition: all 0.2s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(70, 83, 103, 0.08);
        }

        textarea {
            resize: vertical;
        }

        /* Checkbox épurée */
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 20px 0;
        }

        .checkbox-group input[type="checkbox"] {
            margin-top: 3px;
            accent-color: var(--accent-color);
        }

        .checkbox-group label {
            font-family: var(--default-font);
            text-transform: none;
            font-size: 0.95rem;
            color: #64748b;
            letter-spacing: 0;
            cursor: pointer;
        }

        .checkbox-group a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .checkbox-group a:hover {
            text-decoration: underline;
        }

        /* Bouton Minimal */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: var(--contrast-color);
            border: none;
            border-radius: 6px;
            font-family: var(--nav-font);
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #343e4f;
        }

        .btn-submit:active {
            transform: scale(0.99);
        }

        /* Pied de formulaire alternatif */
        .form-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.95rem;
            color: #64748b;
        }

        .form-footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        /* Responsive léger */
        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
            .auth-wrapper {
                padding: 20px 10px;
            }
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="brand-header">
            <h1>Mada film</h1>
            <p>Votre espace cinéma personnel</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="signin">Se connecter</button>
            <button class="tab-btn" data-tab="signup">S'inscrire</button>
        </div>

        <div id="signin" class="form-content active">
            <form method="POST">
                <input type="hidden" name="action" value="signin">

                <div class="form-group">
                    <label for="signin-email">Email</label>
                    <input type="email" id="signin-email" name="email" placeholder="exemple@mail.com" required>
                </div>

                <div class="form-group">
                    <label for="signin-password">Mot de passe</label>
                    <input type="password" id="signin-password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-submit">Se connecter</button>
            </form>

            <div class="form-footer">
                Pas encore inscrit ? <a class="switch-link" data-tab="signup">Créer un compte</a>
            </div>
        </div>

        <div id="signup" class="form-content">
            <form method="POST">
                <input type="hidden" name="action" value="signup">

                <div class="form-row">
                    <div class="form-group">
                        <label for="nom">Nom</label>
                        <input type="text" id="nom" name="nom" required>
                    </div>
                    <div class="form-group">
                        <label for="prenom">Prénom</label>
                        <input type="text" id="prenom" name="prenom" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="date_naissance">Date de naissance</label>
                        <input type="date" id="date_naissance" name="date_naissance" max="2026-12-31" required>
                    </div>
                    <div class="form-group">
                        <label for="sexe">Sexe</label>
                        <select id="sexe" name="sexe" required>
                            <option value="" disabled selected>Choisir</option>
                            <option value="M">Masculin</option>
                            <option value="F">Féminin</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="telephone">Téléphone</label>
                        <input type="tel" id="telephone" name="telephone" placeholder="034 00 000 00">
                    </div>
                    <div class="form-group">
                        <label for="role">Rôle</label>
                        <select id="role" name="role" required>
                            <option value="" disabled selected>Votre rôle</option>
                            <option value="eleve">Élève</option>
                            <option value="prof">Professeur</option>
                            <option value="spectateur">Spectateur / Client</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="adresse">Adresse</label>
                    <textarea id="adresse" name="adresse" rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="exemple@mail.com" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" name="password" minlength="8" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">Confirmation</label>
                        <input type="password" id="confirm_password" name="confirm_password" minlength="8" required>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">J'accepte les <a href="#">conditions d'utilisation</a></label>
                </div>

                <button type="submit" class="btn-submit">Créer mon compte</button>
            </form>

            <div class="form-footer">
                Déjà inscrit ? <a class="switch-link" data-tab="signin">Se connecter</a>
            </div>
        </div>
    </div>

    <script>
        // Gestion moderne et unifiée des onglets et liens de basculement
        function switchTab(tabId) {
            // Masquer tous les formulaires et retirer la classe active des boutons
            document.querySelectorAll('.form-content').forEach(form => form.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            // Activer le formulaire cible
            const targetForm = document.getElementById(tabId);
            if(targetForm) targetForm.classList.add('active');

            // Activer le bouton d'onglet correspondant
            const targetBtn = document.querySelector(`.tab-btn[data-tab="${tabId}"]`);
            if(targetBtn) targetBtn.classList.add('active');
        }

        // Ecouteurs d'événements pour les boutons d'onglets et les liens en bas de page
        document.querySelectorAll('.tab-btn, .switch-link').forEach(element => {
            element.addEventListener('click', (e) => {
                const targetTab = e.target.getAttribute('data-tab');
                switchTab(targetTab);
            });
        });
    </script>
</body>
</html>
